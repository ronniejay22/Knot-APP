name: "CodeQL"

# Advanced CodeQL setup scanning the Python backend only. Swift was dropped: on
# this solo project a ~25-minute macOS build (10x Linux cost) on every push/PR
# was not worth its thin iOS coverage, whereas Python extraction is ~1 minute on
# Linux and covers the real security surface (the FastAPI backend). Re-add a
# swift job here if iOS scanning is ever genuinely needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1" # weekly, Mondays 05:30 UTC

jobs:
  analyze:
    name: "Analyze (python)"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
